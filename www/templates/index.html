<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Revelry — Games Hub</title>
<meta http-equiv="refresh" content="15">
<style>
  body {
    margin: 0;
    padding: 3rem 1.5rem;
    background: #09090b;
    color: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  h1 { text-align: center; margin-bottom: 0.25rem; }
  .subtitle { text-align: center; color: #a1a1aa; margin-bottom: 2.5rem; }
  .grid {
    display: grid;
    gap: 1rem;
    max-width: 640px;
    margin: 0 auto;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  }
  .card {
    border: 1px solid #27272a;
    background: #18181b;
    border-radius: 0.75rem;
    padding: 1.25rem;
  }
  .card-head { display: flex; align-items: center; justify-content: space-between; }
  .card h2 { margin: 0; font-size: 1.1rem; }
  .card p { color: #a1a1aa; font-size: 0.875rem; }
  .status { font-size: 0.75rem; }
  .status.online { color: #34d399; }
  .status.offline { color: #71717a; }
  .play {
    display: inline-block;
    background: #f43f5e;
    color: white;
    text-decoration: none;
    font-weight: 600;
    padding: 0.5rem 1rem;
    border-radius: 999px;
    font-size: 0.875rem;
  }
  .start {
    display: block;
    color: #d4d4d8;
    background: #09090b;
    border: 1px solid #27272a;
    border-radius: 0.5rem;
    padding: 0.5rem 0.75rem;
    font-size: 0.75rem;
    overflow-x: auto;
  }
</style>
</head>
<body>
  <h1>Revelry</h1>
  <p class="subtitle">Pick a game. Page refreshes every 15s to pick up newly started games.</p>
  <div class="grid">
    {{CARDS}}
  </div>
</body>
</html>
